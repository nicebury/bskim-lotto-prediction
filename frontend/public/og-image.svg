      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Lotto balls -->
  <g transform="translate(80,380)">
    <g transform="translate(0,0)"><circle cx="0" cy="0" r="68" fill="#FBC400"/><circle cx="0" cy="0" r="68" fill="url(#ball)"/><text x="0" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">3</text></g>
    <g transform="translate(160,0)"><circle cx="0" cy="0" r="68" fill="#69C8F2"/><circle cx="0" cy="0" r="68" fill="url(#ball)"/><text x="0" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">13</text></g>
    <g transform="translate(320,0)"><circle cx="0" cy="0" r="68" fill="#FF7272"/><circle cx="0" cy="0" r="68" fill="url(#ball)"/><text x="0" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">28</text></g>
    <g transform="translate(480,0)"><circle cx="0" cy="0" r="68" fill="#AAAAAA"/><circle cx="0" cy="0" r="68" fill="url(#ball)"/><text x="0" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">34</text></g>
    <g transform="translate(640,0)"><circle cx="0" cy="0" r="68" fill="#AAAAAA"/><circle cx="0" cy="0" r="68" fill="url(#ball)"/><text x="0" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">38</text></g>
    <g transform="translate(800,0)"><circle cx="0" cy="0" r="68" fill="#B0D840"/><circle cx="0" cy="0" r="68" fill="url(#ball)"/><text x="0" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">42</text></g>
    <g transform="translate(1000,0)"><circle cx="0" cy="0" r="68" fill="#FF7272"/><circle cx="0" cy="0" r="68" fill="url(#ball)"/><text x="0" y="22" text-anchor="middle" font-family="system-ui,sans-serif" font-size="64" font-weight="800" fill="#ffffff">25</text></g>
