  <text x="80" y="180" font-family="system-ui,sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">로또 당첨번호 대시보드</text>
  <text x="80" y="240" font-family="system-ui,sans-serif" font-size="36" font-weight="500" fill="#a5b4fc">6/45 역대 회차 조회 · 1등 당첨금 · 통계</text>
  <text x="80" y="575" font-family="system-ui,sans-serif" font-size="26" font-weight="400" fill="#94a3b8">lotto.example.com · 1,200+ 회차 전체 제공</text>
